# 5 happy path
- id: happy_moscow_budget
  user_message: "Москва, 3 ночи в июне 2026, до 50 000 рублей, рядом с центром"
  lang: ru
  currency: RUB
  assertions:
    - { type: tool_called, name: search_hotels }
