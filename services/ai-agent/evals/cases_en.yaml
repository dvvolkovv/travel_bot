# 5 happy path
- id: happy_barcelona_budget
  user_message: "Barcelona 5 nights in June 2026, under €600 total, close to beach"
  lang: en
  currency: EUR
  assertions:
    - { type: tool_called, name: search_hotels }
    - { type: has_cards_event, min_offers: 3 }

